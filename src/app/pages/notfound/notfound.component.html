<section class="notfound-section">
    <div class="container">
        <div class="notfound-content">
            <!-- 404 Number -->
            <div class="error-number">
                <span class="digit">4</span>
                <span class="digit zero">0</span>
                <span class="digit">4</span>
            </div>

            <!-- Error Message -->
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                Oops! The page you're looking for seems to have wandered off into the digital void.
                Don't worry, even the best developers get lost sometimes! 🚀
            </p>

            <!-- Action Buttons -->
            <div class="error-actions">
                <a routerLink="/" class="btn btn-primary btn-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5ZM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5 5 5Z" />
                    </svg>
                    <span>Go Home</span>
                </a>
                <a href="javascript:history.back()" class="btn btn-secondary btn-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                    </svg>
                    <span>Go Back</span>
                </a>
            </div>

            <!-- Helpful Links -->
            <div class="helpful-links">
                <p class="links-title">Or explore these pages:</p>
                <div class="quick-links">
                    <a routerLink="/" class="quick-link">Home</a>
                    <a routerLink="/Skills" class="quick-link">Skills</a>
                    <a routerLink="/Project" class="quick-link">Projects</a>
                    <a routerLink="/Contact-Us" class="quick-link">Contact</a>
                </div>
            </div>

            <!-- Animated Decoration -->
            <div class="floating-elements">
                <div class="float-element element-1">💻</div>
                <div class="float-element element-2">🚀</div>
                <div class="float-element element-3">⚡</div>
                <div class="float-element element-4">🎯</div>
            </div>
        </div>
    </div>
</section>
